services:
  - type: web
    name: nova-backend
    runtime: node
    plan: free
    rootDir: .
    # --omit=optional → ağır/native paketleri (better-sqlite3, @xenova/transformers,
    # pi-coding-agent) ATLAR. Çekirdek planlama özellikleri bunlara ihtiyaç duymaz;
    # build hızlanır ve native derleme riski kalkar. Newsletter/OCR istenirse
    # FEATURES env'i açılıp bu satırdan --omit=optional kaldırılır.
    buildCommand: npm install --omit=optional
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20.18.0
    # ── Aşağıdakileri Render Dashboard → Settings → Environment'ta ELLE girin ──
    # (Gerçek kimlik bilgileri; repoya asla commit edilmez.)
    #
    #   SUPABASE_URL          → Supabase Project URL (kalıcı depolama, ZORUNLU)
    #   SUPABASE_SERVICE_KEY  → Supabase service_role secret (ZORUNLU)
    #   APP_PASSWORD          → uygulama giriş parolası (ZORUNLU)
    #   AUTH_SECRET           → rastgele uzun bir metin (token imzası, ZORUNLU)
    #
    # İsteğe bağlı (yalnızca ilgili özelliği açarsanız):
    #   FEATURES              → virgülle: newsletter,ocr,ai,sync (boş = çekirdek)
    #   OPENROUTER_API_KEY / OPENAI_API_KEY  → ai
    #   GMAIL_USER / GMAIL_APP_PASSWORD ...  → sync (IMAP)
    #
    # NOT: Artık dashboard/design-board verisi Supabase'de KALICI durur; Render
    # free tier diskini sıfırlasa bile veri kaybolmaz. (newsletter SQLite ve TrOCR
    # modeli hâlâ ephemeral'dır ama bu özellikler varsayılan olarak kapalıdır.)
